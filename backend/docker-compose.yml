services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: dailys
      POSTGRES_PASSWORD: dailys
      POSTGRES_DB: dailys
    ports:
      - "5432:5432"
    volumes:
      - dailys_pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dailys -d dailys"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  api:
    build: .
    ports:
      - "8000:8000"
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://dailys:dailys@postgres:5432/dailys
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

volumes:
  dailys_pg:
  uploads_data:
